name: test

# Two jobs:
#  - lint + pytest run uv-style (matches the rest of the fleet)
#    and need hummingbird sibling-checked-out because the
#    [tool.uv.sources] block in pyproject.toml resolves it from
#    ../hummingbird.
#  - image builds the published Dockerfile end-to-end (kibble
#    base + plugin install) so a Dockerfile-only break surfaces
#    on PR rather than at release time.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Nightly run catches hummingbird:latest base-image
  # regressions that break this plugin within ~24h, instead of
  # waiting for the next push here to surface them. 07:00 UTC
  # is offset 30 min from nnels's nightly so the pair don't
  # compete for the same kibble pull.
  schedule:
    - cron: "0 7 * * *"
  # Manual trigger for "I just published a new hummingbird and
  # want a green light before tagging this plugin."
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: openapi-dodp
      - uses: actions/checkout@v6
        with:
          repository: cobdfamily/hummingbird
          path: hummingbird
      - uses: astral-sh/setup-uv@v6
        with: { version: latest, enable-cache: true }
      - run: uv python install 3.12
        working-directory: openapi-dodp
      - run: uv sync --frozen
        working-directory: openapi-dodp
      - name: ruff check
        run: uv run ruff check src tests
        working-directory: openapi-dodp

  pytest:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v6
        with:
          path: openapi-dodp
      - uses: actions/checkout@v6
        with:
          repository: cobdfamily/hummingbird
          path: hummingbird
      - uses: astral-sh/setup-uv@v6
        with: { version: latest, enable-cache: true }
      - run: uv python install 3.12
        working-directory: openapi-dodp
      - run: uv sync --frozen
        working-directory: openapi-dodp
      - name: pytest with coverage
        run: uv run pytest -q --cov --cov-report=term --cov-report=xml
        working-directory: openapi-dodp

      - name: upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: openapi-dodp/coverage.xml
          if-no-files-found: warn

  image:
    runs-on: ubuntu-latest
    needs: [lint]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: set up buildx (for kibble base pull over plain HTTP)
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."kibble.apps.blindhub.ca"]
              http = true
              insecure = true

      - name: build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          platforms: linux/amd64
          tags: cobdfamily/openapi-dodp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
