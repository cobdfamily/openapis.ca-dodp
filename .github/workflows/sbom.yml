name: sbom

# CycloneDX 1.6 SBOM, sibling-checkout variant.
#
# Same shape as the canonical sbom.yml shipped across
# the rest of the Python+uv fleet, with one difference:
# this repo's pyproject.toml has a [tool.uv.sources]
# entry pointing `hummingbird` at `../hummingbird`. The
# sibling has to be checked out at the right relative
# path before `uv sync --frozen` will resolve it.
# Matches the dual-checkout pattern used by this repo's
# test.yml.
#
# If hummingbird is later refactored to publish via
# PyPI (or kibble's python index) and this repo stops
# needing the sibling, swap this file for the canonical
# sbom.yml.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: ${{ github.event.repository.name }}
      - uses: actions/checkout@v6
        with:
          repository: cobdfamily/hummingbird
          path: hummingbird
      - uses: astral-sh/setup-uv@v6
        with:
          version: latest
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --frozen
        working-directory: ${{ github.event.repository.name }}
      - name: Generate CycloneDX SBOM
        working-directory: ${{ github.event.repository.name }}
        run: |
          uv tool install cyclonedx-bom
          cyclonedx-py environment .venv/bin/python \
            --pyproject pyproject.toml \
            --output-reproducible \
            --output-file bom.cdx.json
      - name: Validate SBOM has components
        working-directory: ${{ github.event.repository.name }}
        run: |
          components=$(jq '.components | length' bom.cdx.json)
          echo "SBOM contains $components components"
          if [ "$components" -lt 1 ]; then
            echo "ERROR: SBOM is empty"
            exit 1
          fi
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.ref_name }}
          path: ${{ github.event.repository.name }}/bom.cdx.json
          retention-days: 90
          if-no-files-found: error
