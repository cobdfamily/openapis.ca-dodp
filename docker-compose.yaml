# Production deploy for openapi-dodp.
#
# Pulls the published image from the cobdfamily kibble registry.
# The plugin is baked in at build time and HUMMINGBIRD_PLUGIN is
# defaulted to openapi_dodp, so `docker compose up -d` is the
# entire deploy. The one mandatory operator-supplied value is
# OPENAPI_DODP_BASE_URL -- pointing at the upstream DODP SOAP
# service (Kolibre KADOS or any other DODP-conformant impl).
#
# Pin a version via OPENAPI_DODP_TAG:
#     OPENAPI_DODP_TAG=0.1.0 docker compose up -d
#
# Local dev: uncomment the `build:` block to rebuild from this
# checkout off the kibble hummingbird base image. CI uses
# release.yml to build and push to kibble directly.

services:
  openapi-dodp:
    image: kibble.apps.blindhub.ca/cobdfamily/openapi-dodp:${OPENAPI_DODP_TAG:-latest}
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    #   args:
    #     HUMMINGBIRD_TAG: "${OPENAPI_DODP_HUMMINGBIRD_TAG:-latest}"
    container_name: openapi-dodp
    ports:
      - "${OPENAPI_DODP_HTTP_PORT:-8000}:8000"
    environment:
      # The mandatory knob. Empty -> plugin loads but every hook
      # returns its empty fallback (and logs a warning at boot).
      # An operator who sees "no books for any user" should
      # check this value first.
      OPENAPI_DODP_BASE_URL: "${OPENAPI_DODP_BASE_URL:-}"

      # Optional knobs. The defaults match the DODP v2.0.2 spec
      # + Kolibre KADOS conventions; override only when pointing
      # at a non-conformant backend.
      OPENAPI_DODP_NAMESPACE: "${OPENAPI_DODP_NAMESPACE:-http://www.daisy.org/ns/daisy-online/}"
      OPENAPI_DODP_BOOKSHELF_LIST_ID: "${OPENAPI_DODP_BOOKSHELF_LIST_ID:-issued}"
      OPENAPI_DODP_USER_AGENT: "${OPENAPI_DODP_USER_AGENT:-openapi-dodp/0.1}"
      OPENAPI_DODP_REQUEST_TIMEOUT_SECONDS: "${OPENAPI_DODP_REQUEST_TIMEOUT_SECONDS:-30}"

      # The image already sets HUMMINGBIRD_PLUGIN=openapi_dodp
      # by default; included here for visibility.
      HUMMINGBIRD_PLUGIN: openapi_dodp

      # Hummingbird's standalone-fallback creds are unused once
      # this plugin's authenticate() runs, but pydantic-settings
      # still reads the env. Leave blank.
      HUMMINGBIRD_USERNAME: ""
      HUMMINGBIRD_PASSWORD: ""
    volumes:
      # Bookshelf/session state hummingbird writes to disk
      # (per-user JSON files). Survives container rebuilds.
      - openapi-dodp-data:/app/data
      # Downloaded book audio cache. Same survival policy --
      # operators can prune by tearing down the volume.
      - openapi-dodp-cache:/app/cache
    restart: unless-stopped

volumes:
  openapi-dodp-data:
    name: openapi-dodp-data
  openapi-dodp-cache:
    name: openapi-dodp-cache
